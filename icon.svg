<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0E16"/>
      <stop offset="100%" stop-color="#06060A"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5F1F"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8C8D0"/>
      <stop offset="100%" stop-color="#909098"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#FF5F1F" stroke-width="3" stroke-opacity="0.25"/>
  <rect x="0" y="0" width="512" height="5" rx="2.5" fill="url(#fireGrad)"/>

  <!-- Left outer plate -->
  <rect x="52" y="168" width="28" height="156" rx="8" fill="url(#fireGrad)"/>
  <!-- Left inner plate -->
  <rect x="80" y="184" width="18" height="124" rx="6" fill="#FF8C42"/>
  <!-- Left collar -->
  <rect x="98" y="198" width="20" height="96" rx="5" fill="#FF6A30"/>

  <!-- Bar -->
  <rect x="118" y="226" width="276" height="40" rx="8" fill="url(#barGrad)"/>
  <rect x="118" y="226" width="276" height="10" rx="8" fill="white" opacity="0.08"/>

  <!-- Right collar -->
  <rect x="394" y="198" width="20" height="96" rx="5" fill="#FF6A30"/>
  <!-- Right inner plate -->
  <rect x="414" y="184" width="18" height="124" rx="6" fill="#FF8C42"/>
  <!-- Right outer plate -->
  <rect x="432" y="168" width="28" height="156" rx="8" fill="url(#fireGrad)"/>

  <!-- CA -->
  <text x="256" y="415"
        font-family="Arial Black, Impact, sans-serif"
        font-size="88" font-weight="900"
        fill="#FF5F1F" text-anchor="middle"
        letter-spacing="14" opacity="0.95">CA</text>

  <rect x="156" y="424" width="200" height="4" rx="2" fill="url(#fireGrad)" opacity="0.6"/>

  <circle cx="208" cy="462" r="5" fill="#FF5F1F" opacity="0.5"/>
  <circle cx="256" cy="462" r="5" fill="#FF8C42" opacity="0.7"/>
  <circle cx="304" cy="462" r="5" fill="#FF5F1F" opacity="0.5"/>
</svg>
