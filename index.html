
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متتبعي اليومي | Coach Anis</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --gold2: #E8C97A;
  --dark: #080808;
  --dark2: #0F0F0F;
  --dark3: #161616;
  --text: #EFEFEF;
  --dim: #666;
  --border: rgba(201,168,76,0.18);
  --accent-cal: #E8A87A;
  --accent-wgt: #7AB8E8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999;
}

.bg-glow {
  position:fixed; inset:0;
  background: radial-gradient(ellipse 70% 40% at 50% -5%, rgba(201,168,76,0.07) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* HEADER */
.header {
  text-align:center;
  padding: 48px 24px 32px;
  position:relative; z-index:1;
}

.header h1 {
  font-family:'Bebas Neue', sans-serif;
  font-size: clamp(34px, 8vw, 62px);
  letter-spacing:2px; line-height:.95;
  margin-bottom:8px;
}
.header h1 span { color:var(--gold); }

.header p {
  font-size:13px; color:var(--dim);
  max-width:380px; margin:0 auto;
  line-height:1.7;
}

/* TABS */
.tabs {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:0 20px 36px;
  position:relative; z-index:1;
}

.tab-btn {
  display:flex; align-items:center; gap:8px;
  padding:12px 24px;
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:30px;
  font-family:'Cairo', sans-serif;
  font-size:14px; font-weight:700;
  color:var(--dim);
  cursor:pointer;
  transition:all .25s;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active-cal { border-color:var(--accent-cal); color:var(--accent-cal); }
.tab-btn.active-wgt { border-color:var(--accent-wgt); color:var(--accent-wgt); }

/* PANELS */
.panel { display:none; padding:0 20px 60px; max-width:1100px; margin:0 auto; }
.panel.active { display:block; }

/* SUMMARY */
.summary-strip, .wgt-summary {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:16px;
  margin-bottom:32px;
}

.strip-card, .wgt-sum-card {
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  text-align:center;
  transition:all .25s;
}
.strip-card:hover, .wgt-sum-card:hover { border-color:var(--gold); transform:translateY(-3px); }

.strip-card .sv, .wgt-sum-card .wv {
  font-family:'Bebas Neue', sans-serif;
  font-size:28px; line-height:1;
  margin-bottom:6px;
}
.strip-card .sl, .wgt-sum-card .wl {
  font-size:11px; color:var(--dim); letter-spacing:1px;
}

/* DAY CARD (Calories) */
.day-card {
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
  transition:all .25s;
}
.day-card:hover {
  border-color:rgba(201,168,76,.4);
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(0,0,0,.4);
}

/* WEIGHT LIST */
.wgt-list-wrap {
  max-height: 520px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) transparent;
}

.month-group { margin-bottom: 28px; }
.month-header {
  font-family:'Bebas Neue', sans-serif;
  font-size:13px; letter-spacing:3px;
  color:var(--accent-wgt);
  margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.month-header::after {
  content:''; flex:1; height:1px; background:var(--border);
}

.wgt-row {
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 20px;
  margin-bottom:10px;
  display:flex; align-items:center; gap:14px;
  transition:all .25s;
}
.wgt-row:hover { border-color:var(--accent-wgt); }

.wgt-row-date {
  font-size:15px; font-weight:700; min-width:110px;
}
.wgt-row-date span {
  display:block; font-size:12px; color:var(--dim);
}

.wgt-row-input {
  flex:1;
  background:var(--dark3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  text-align:center;
  font-size:16px; font-weight:600;
  outline:none;
}
.wgt-row-input:focus {
  border-color:var(--accent-wgt);
  box-shadow:0 0 0 3px rgba(122,184,232,.2);
}

.wgt-row-diff {
  font-family:'Bebas Neue', sans-serif;
  padding:8px 18px;
  border-radius:30px;
  font-size:13px; font-weight:700;
  min-width:78px; text-align:center;
}
.wgt-row-diff.loss { background:rgba(34,197,94,.15); color:#22c55e; }
.wgt-row-diff.gain { background:rgba(239,68,68,.15); color:#ef4444; }
.wgt-row-diff.same, .wgt-row-diff.empty { background:rgba(102,102,102,.15); color:var(--dim); }

/* Buttons */
.btn-add-day, .btn-add-slot {
  width:100%;
  padding:16px;
  border-radius:30px;
  border:2px dashed var(--gold);
  background:rgba(201,168,76,.08);
  color:var(--gold);
  font-family:'Cairo', sans-serif;
  font-size:15px; font-weight:700;
  cursor:pointer;
  transition:all .25s;
}
.btn-add-day:hover, .btn-add-slot:hover {
  background:rgba(201,168,76,.2);
  transform:scale(1.03);
}

/* Responsive */
@media(max-width:480px) {
  .header { padding:40px 20px 28px; }
  .tabs, .panel { padding-left:14px; padding-right:14px; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="header">
  <h1>متتبعي<br><span>Coach Anis</span></h1>
  <p>السعرات الحرارية · تتبع الوزن · تقدم يومي</p>
  <div style="font-family:'Bebas Neue';letter-spacing:3px;font-size:11px;color:var(--gold);opacity:.5;margin-top:12px;">RESULTS · DISCIPLINE · CONSISTENCY</div>
</div>

<div class="tabs">
  <button class="tab-btn active-cal" onclick="switchTab('cal')">🔥 السعرات الحرارية</button>
  <button class="tab-btn" onclick="switchTab('bud')">⚖️ تتبع الوزن</button>
</div>

<!-- Calories Panel -->
<div class="panel active" id="panel-cal">
  <div class="summary-strip">
    <div class="strip-card"><div class="sv" id="sum-total">0</div><div class="sl">إجمالي السعرات</div></div>
    <div class="strip-card"><div class="sv" id="sum-days">0</div><div class="sl">أيام مسجلة</div></div>
    <div class="strip-card"><div class="sv" id="sum-avg">0</div><div class="sl">المعدل اليومي</div></div>
  </div>
  <div id="days-container"></div>
  <button class="btn-add-day" onclick="addDay()">+ إضافة يوم جديد</button>
</div>

<!-- Weight Panel -->
<div class="panel" id="panel-bud">
  <div style="display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;">
    <div style="flex:1;min-width:200px;">
      <label style="font-size:12px;color:var(--dim);display:block;margin-bottom:8px;">⚖️ وزني الحالي (كغ)</label>
      <input id="start-weight" type="number" step="0.1" placeholder="80" oninput="saveGoals()" 
             style="width:100%;background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:16px;">
    </div>
    <div style="flex:1;min-width:200px;">
      <label style="font-size:12px;color:var(--dim);display:block;margin-bottom:8px;">🎯 وزني المستهدف (كغ)</label>
      <input id="target-weight" type="number" step="0.1" placeholder="70" oninput="saveGoals();updateWgtSummary()" 
             style="width:100%;background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:16px;">
    </div>
  </div>

  <div class="wgt-summary">
    <div class="wgt-sum-card"><div class="wv" id="w-current">--</div><div class="wl">آخر وزن مسجل</div></div>
    <div class="wgt-sum-card"><div class="wv" id="w-diff">--</div><div class="wl">الفرق عن البداية</div></div>
    <div class="wgt-sum-card"><div class="wv" id="w-remaining">--</div><div class="wl">المتبقي للهدف</div></div>
  </div>

  <div class="wgt-list-wrap" id="wgt-list"></div>
</div>

<script>
// ──────────────────────────────────────────────
//  STORAGE + ARABIC NAMES (نفس الأصلي)
// ──────────────────────────────────────────────
const KEY_CAL = 'trackerCalories_v2';
const KEY_WGT = 'trackerWeight_v2';

function saveCalData(data) { try { localStorage.setItem(KEY_CAL, JSON.stringify(data)); } catch(e){} }
function loadCalData() { try { return JSON.parse(localStorage.getItem(KEY_CAL)) || []; } catch(e){ return []; } }

function saveWgtData(d) { try { localStorage.setItem(KEY_WGT, JSON.stringify(d)); } catch(e){} }
function loadWgtData() { try { return JSON.parse(localStorage.getItem(KEY_WGT)) || {weights:{}, startWeight:null, targetWeight:null}; } catch(e){ return {weights:{}, startWeight:null, targetWeight:null}; } }

const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${AR_DAYS[d.getDay()]} ${d.getDate()} ${AR_MONTHS[d.getMonth()]}`;
}

// ──────────────────────────────────────────────
//  TABS
// ──────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-cal','active-wgt'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if(tab === 'cal') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active-cal');
    document.getElementById('panel-cal').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active-wgt');
    document.getElementById('panel-bud').classList.add('active');
  }
}

// ──────────────────────────────────────────────
//  CALORIES (كامل)
// ──────────────────────────────────────────────
let calDays = loadCalData();
if(calDays.length === 0) {
  calDays = [{ id: Date.now(), date: new Date().toISOString().split('T')[0], slots: ['','','','',''] }];
  saveCalData(calDays);
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function addDay() {
  const newDay = { id: Date.now(), date: todayStr(), slots: ['','','','',''] };
  calDays.unshift(newDay);
  saveCalData(calDays);
  renderDays();
}

function removeDay(id) {
  calDays = calDays.filter(d => d.id !== id);
  saveCalData(calDays);
  renderDays();
}

function addSlot(id) {
  const day = calDays.find(d => d.id === id);
  if(day) { day.slots.push(''); saveCalData(calDays); renderDays(); }
}

function removeSlot(id, idx) {
  const day = calDays.find(d => d.id === id);
  if(day && day.slots.length > 1) {
    day.slots.splice(idx, 1);
    saveCalData(calDays);
    renderDays();
  }
}

function updateSlot(id, idx, val) {
  const day = calDays.find(d => d.id === id);
  if(day) {
    day.slots[idx] = val;
    saveCalData(calDays);
    renderDays();
  }
}

function updateDateForDay(id, val) {
  const day = calDays.find(d => d.id === id);
  if(day) { day.date = val; saveCalData(calDays); renderDays(); }
}

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  calDays.forEach(day => {
    const total = day.slots.reduce((a, v) => a + (parseFloat(v) || 0), 0);
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div style="padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:15px;font-weight:700">يوم</span>
            <input type="date" value="${day.date}" onchange="updateDateForDay(${day.id}, this.value)" style="background:transparent;border:none;color:var(--dim);font-size:15px;cursor:pointer">
          </div>
          <div style="font-size:13px;color:var(--dim);margin-top:4px">${formatDate(day.date)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-family:'Bebas Neue',sans-serif;background:rgba(232,168,122,.18);color:var(--accent-cal);border:1px solid rgba(232,168,122,.3);border-radius:30px;padding:6px 16px;font-size:13px;font-weight:700;">${total > 0 ? total.toLocaleString() + ' سعرة' : '0 سعرة'}</div>
          <button onclick="removeDay(${day.id})" style="background:none;border:none;color:#ef4444;font-size:22px;cursor:pointer">✕</button>
        </div>
      </div>
      <div style="padding:20px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px">
          ${day.slots.map((v, i) => `
            <div style="position:relative">
              <span style="position:absolute;top:-8px;right:12px;font-size:10px;color:var(--dim);background:var(--dark2);padding:0 6px">وجبة ${i+1}</span>
              <input type="number" value="${v}" placeholder="0" oninput="updateSlot(${day.id},${i},this.value)" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--dark3);text-align:center;font-size:16px">
              ${day.slots.length > 1 ? `<button onclick="removeSlot(${day.id},${i})" style="position:absolute;top:12px;left:12px;background:none;border:none;color:#ef4444">✕</button>` : ''}
            </div>
          `).join('')}
        </div>
        <button onclick="addSlot(${day.id})" class="btn-add-slot" style="margin-top:16px">+ وجبة جديدة</button>
      </div>
    `;
    container.appendChild(card);
  });
  updateCalSummary();
}

function updateCalSummary() {
  const daysWithData = calDays.filter(d => d.slots.some(v => parseFloat(v) > 0));
  const totalCals = calDays.reduce((a, d) => a + d.slots.reduce((b, v) => b + (parseFloat(v)||0), 0), 0);
  const avg = daysWithData.length ? Math.round(totalCals / daysWithData.length) : 0;
  document.getElementById('sum-total').textContent = totalCals.toLocaleString();
  document.getElementById('sum-days').textContent = daysWithData.length;
  document.getElementById('sum-avg').textContent = avg.toLocaleString();
}

// ──────────────────────────────────────────────
//  WEIGHT TRACKING (كامل الآن)
// ──────────────────────────────────────────────
let wgtData = loadWgtData();

function saveGoals() {
  wgtData.startWeight = parseFloat(document.getElementById('start-weight').value) || null;
  wgtData.targetWeight = parseFloat(document.getElementById('target-weight').value) || null;
  saveWgtData(wgtData);
  updateWgtSummary();
}

function updateWeight(dateStr, val) {
  const v = parseFloat(val);
  if (val === '' || isNaN(v)) delete wgtData.weights[dateStr];
  else wgtData.weights[dateStr] = v;
  saveWgtData(wgtData);
  updateWgtSummary();
  renderWeight();
}

function getSortedEntries() {
  return Object.entries(wgtData.weights)
    .filter(([,v]) => v !== null && !isNaN(v))
    .sort((a,b) => a[0].localeCompare(b[0]));
}

function updateWgtSummary() {
  const entries = getSortedEntries();
  const last = entries.length ? entries[entries.length-1][1] : null;
  const start = wgtData.startWeight;
  const target = wgtData.targetWeight;

  document.getElementById('w-current').textContent = last !== null ? last + ' كغ' : '--';

  const diffEl = document.getElementById('w-diff');
  if(last !== null && start !== null) {
    const d = +(last - start).toFixed(1);
    diffEl.textContent = (d > 0 ? '+' : '') + d + ' كغ';
    diffEl.className = 'wv ' + (d < 0 ? 'loss' : d > 0 ? 'gain' : '');
  } else { diffEl.textContent = '--'; diffEl.className = 'wv'; }

  const remEl = document.getElementById('w-remaining');
  if(last !== null && target !== null) {
    const r = +(last - target).toFixed(1);
    if(r <= 0) { remEl.textContent = '🎉 وصلت!'; remEl.className = 'wv loss'; }
    else { remEl.textContent = r + ' كغ'; remEl.className = 'wv loss'; }
  } else { remEl.textContent = '--'; remEl.className = 'wv'; }
}

function generateDates() {
  const dates = [];
  const start = new Date('2026-04-10');
  const end = new Date('2026-12-31');
  let cur = new Date(start);
  while(cur <= end) {
    dates.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}
const ALL_DATES = generateDates();

function renderWeight() {
  document.getElementById('start-weight').value = wgtData.startWeight || '';
  document.getElementById('target-weight').value = wgtData.targetWeight || '';

  const list = document.getElementById('wgt-list');
  list.innerHTML = '';

  const groups = {};
  ALL_DATES.forEach(d => {
    const m = d.slice(0,7);
    if(!groups[m]) groups[m] = [];
    groups[m].push(d);
  });

  const entries = getSortedEntries();

  Object.entries(groups).forEach(([monthKey, dates]) => {
    const [y, mo] = monthKey.split('-');
    const groupHTML = document.createElement('div');
    groupHTML.className = 'month-group';
    groupHTML.innerHTML = `<div class="month-header">${AR_MONTHS[parseInt(mo)-1]} ${y}</div>`;

    dates.forEach(dateStr => {
      const w = wgtData.weights[dateStr];
      const d = new Date(dateStr + 'T00:00:00');

      const sortedIdx = entries.findIndex(e => e[0] === dateStr);
      let diffHTML = `<div class="wgt-row-diff empty" data-wdiff="${dateStr}">--</div>`;

      if(w !== undefined && sortedIdx > 0) {
        const prev = entries[sortedIdx-1][1];
        const diff = +(w - prev).toFixed(1);
        const cls = diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same';
        diffHTML = `<div class="wgt-row-diff ${cls}" data-wdiff="${dateStr}">${diff > 0 ? '+' : ''}${diff} كغ</div>`;
      } else if(w !== undefined) {
        diffHTML = `<div class="wgt-row-diff same" data-wdiff="${dateStr}">--</div>`;
      }

      const row = document.createElement('div');
      row.className = 'wgt-row';
      row.innerHTML = `
        <div class="wgt-row-date">
          ${d.getDate()} ${AR_MONTHS[d.getMonth()]}
          <span>${AR_DAYS[d.getDay()]}</span>
        </div>
        <input class="wgt-row-input" type="number" placeholder="--" value="${w !== undefined ? w : ''}" step="0.1" min="0" oninput="updateWeight('${dateStr}', this.value)" />
        ${diffHTML}
      `;
      groupHTML.appendChild(row);
    });
    list.appendChild(groupHTML);
  });

  updateWgtSummary();
}

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
renderDays();
renderWeight();
</script>
</body>
</html>
