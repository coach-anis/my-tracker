<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06060A">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --fire: #FF5F1F;
  --fire2: #FF8C42;
  --gold: #F5C842;
  --gold2: #FFE17A;
  --teal: #00D4AA;
  --teal2: #00F5C4;
  --blue: #4DA6FF;
  --red: #FF4D6D;
  --bg: #06060A;
  --bg2: #0E0E16;
  --bg3: #15151F;
  --bg4: #1C1C28;
  --text: #F0F0F8;
  --muted: #5A5A72;
  --border: rgba(255,255,255,0.06);
  --border-fire: rgba(255,95,31,0.2);
  --border-gold: rgba(245,200,66,0.2);
  --border-teal: rgba(0,212,170,0.2);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated bg mesh ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 55% 30% at 15% 0%, rgba(255,95,31,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 45% 25% at 85% 5%, rgba(0,212,170,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 40% 20% at 50% 100%, rgba(245,200,66,0.04) 0%, transparent 50%);
  pointer-events:none;
}

/* grain */
body::after {
  content:'';
  position:fixed; inset:0; z-index:999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none;
}

/* ── TABS ── */
.tabs {
  display: flex;
  padding: 20px 16px 0;
  gap: 8px;
  position: relative; z-index: 1;
  max-width: 640px;
  margin: 0 auto;
}

.tab-btn {
  flex: 1;
  padding: 14px 10px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  position: relative;
  overflow: hidden;
  letter-spacing: 0.5px;
}

.tab-btn::after {
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition: opacity .3s;
}

.tab-btn.active-cal {
  background: rgba(255,95,31,0.1);
  color: var(--fire2);
  border-color: rgba(255,95,31,0.35);
  box-shadow: 0 0 24px rgba(255,95,31,0.12), inset 0 1px 0 rgba(255,95,31,0.15);
}

.tab-btn.active-bud {
  background: rgba(0,212,170,0.08);
  color: var(--teal);
  border-color: rgba(0,212,170,0.3);
  box-shadow: 0 0 24px rgba(0,212,170,0.1), inset 0 1px 0 rgba(0,212,170,0.12);
}

/* ── PANELS ── */
.panel { display:none; padding: 20px 16px 80px; position:relative; z-index:1; max-width:640px; margin:0 auto; }
.panel.active { display:block; animation: fadeUp .35s ease both; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── GOAL CARDS ── */
.goals-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.goal-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  transition: border-color .2s;
  position: relative;
  overflow: hidden;
}

.goal-card.fire-card {
  border-color: var(--border-fire);
}
.goal-card.fire-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--fire), var(--fire2));
}
.goal-card.gold-card {
  border-color: var(--border-gold);
}
.goal-card.gold-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
}

.goal-card label {
  display: block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.goal-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.goal-input {
  flex: 1;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  min-width: 0;
}

.goal-card.fire-card .goal-input:focus {
  border-color: rgba(255,95,31,0.5);
  box-shadow: 0 0 0 3px rgba(255,95,31,0.08);
}
.goal-card.gold-card .goal-input:focus {
  border-color: rgba(245,200,66,0.5);
  box-shadow: 0 0 0 3px rgba(245,200,66,0.08);
}
.goal-input::placeholder { color: rgba(255,255,255,0.1); }

.goal-unit {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.fire-card .goal-unit { color: var(--fire2); }
.gold-card .goal-unit { color: var(--gold); }

/* ── SUMMARY STRIP ── */
.summary-strip {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.strip-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.strip-card:active { transform: scale(0.97); }

.strip-card.s1 { border-color: var(--border-fire); }
.strip-card.s1::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,var(--fire),var(--fire2)); }
.strip-card.s4 { border-color: var(--border-gold); }
.strip-card.s4::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,var(--gold),var(--gold2)); }

.strip-card .sv {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 5px;
  letter-spacing: -1px;
}
.strip-card .sl {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
}
.strip-card.s1 .sv { color: var(--fire2); }
.strip-card.s4 .sv { color: var(--gold); }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── DAY CARD ── */
.day-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color .25s, box-shadow .25s;
}
.day-card:focus-within {
  border-color: rgba(255,95,31,0.3);
  box-shadow: 0 4px 32px rgba(255,95,31,0.07);
}

.day-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
}

.day-num {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}

.day-pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--fire);
  box-shadow: 0 0 10px rgba(255,95,31,0.7);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 10px rgba(255,95,31,0.7); }
  50%      { box-shadow: 0 0 18px rgba(255,95,31,0.4); }
}

.day-badge {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--fire2);
  background: rgba(255,95,31,0.1);
  border: 1px solid rgba(255,95,31,0.2);
  border-radius: 22px;
  padding: 5px 14px;
  min-width: 90px;
  text-align: center;
  line-height: 1.3;
}

.btn-rm-day {
  background: none;
  border: none;
  color: var(--red);
  opacity: .3;
  font-size: 1rem;
  cursor: pointer;
  transition: opacity .2s;
  margin-right: 4px;
}
.btn-rm-day:hover { opacity: 1; }

.day-card-body { padding: 16px 18px; }

/* ── SECTION SUBLABEL inside card ── */
.sub-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sub-label.fire { color: var(--fire2); }
.sub-label.gold { color: var(--gold); }
.sub-label .sub-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sub-label.fire .sub-dot { background: var(--fire); }
.sub-label.gold .sub-dot { background: var(--gold); }

/* ── SLOTS GRID ── */
.slots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}

.slot-wrap { position: relative; padding-top: 14px; }

.slot-label {
  position: absolute;
  top: 0; right: 6px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--muted);
  background: var(--bg2);
  padding: 0 4px;
  text-transform: uppercase;
}

.slot-input-wrap { display: flex; align-items: center; gap: 4px; }

.slot-input {
  width: 100%;
  padding: 10px 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.slot-input::placeholder { color: rgba(255,255,255,0.08); }

.slot-input.cal:focus {
  border-color: rgba(255,95,31,0.5);
  box-shadow: 0 0 0 3px rgba(255,95,31,0.08);
}
.slot-input.pro:focus {
  border-color: rgba(245,200,66,0.5);
  box-shadow: 0 0 0 3px rgba(245,200,66,0.08);
}
.slot-input.cal { border-color: rgba(255,95,31,0.15); }
.slot-input.pro { border-color: rgba(245,200,66,0.15); }

.btn-rm-slot {
  background: none;
  border: none;
  color: var(--red);
  opacity: .3;
  font-size: 0.85rem;
  cursor: pointer;
  transition: opacity .2s;
  flex-shrink: 0;
}
.btn-rm-slot:hover { opacity: 1; }

/* ── PROGRESS BAR ── */
.prog-wrap {
  height: 4px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  margin-bottom: 18px;
  overflow: hidden;
}
.prog-bar {
  height: 100%;
  border-radius: 10px;
  transition: width .5s cubic-bezier(.34,1.56,.64,1);
}
.prog-bar.fire { background: linear-gradient(90deg, var(--fire), var(--fire2)); }
.prog-bar.gold { background: linear-gradient(90deg, var(--gold), var(--gold2)); }

/* ── ACTIONS ROW ── */
.day-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.btn-add-slot {
  background: none;
  border: 1px dashed rgba(255,255,255,0.08);
  color: var(--muted);
  border-radius: 10px;
  padding: 8px 16px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.btn-add-slot:hover {
  border-color: var(--fire2);
  color: var(--fire2);
  background: rgba(255,95,31,0.04);
}

/* ── RESET BTN ── */
.btn-reset {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: 1px dashed rgba(255,77,109,0.3);
  background: rgba(255,77,109,0.04);
  color: rgba(255,77,109,0.7);
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all .25s;
  margin-top: 6px;
  letter-spacing: 1px;
}
.btn-reset:hover {
  background: rgba(255,77,109,0.1);
  border-color: var(--red);
  color: var(--red);
}

/* ── WEIGHT PANEL ── */
.wgt-goals-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.wgt-goal-card {
  background: var(--bg2);
  border: 1px solid var(--border-teal);
  border-radius: 16px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.wgt-goal-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--teal), var(--teal2));
}

.wgt-goal-card label {
  display: block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.wgt-goal-input {
  width: 100%;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(0,212,170,0.2);
  background: var(--bg3);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.wgt-goal-input:focus {
  border-color: rgba(0,212,170,0.5);
  box-shadow: 0 0 0 3px rgba(0,212,170,0.08);
}
.wgt-goal-input::placeholder { color: rgba(255,255,255,0.1); }

/* Summary cards */
.wgt-summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.wgt-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 12px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.wgt-card.teal { border-color: var(--border-teal); }
.wgt-card.teal::before { content:''; position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--teal2)); }
.wgt-card.green { border-color: rgba(0,212,170,0.15); }
.wgt-card.green::before { content:''; position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#00D4AA,#7AE8B8); }
.wgt-card.gold-c { border-color: var(--border-gold); }
.wgt-card.gold-c::before { content:''; position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2)); }
.wgt-card.orange-c { border-color: rgba(255,95,31,0.2); }
.wgt-card.orange-c::before { content:''; position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--fire),var(--fire2)); }

.wgt-val {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 5px;
  letter-spacing: -0.5px;
}
.wgt-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform:uppercase; font-weight:700; }
.wgt-card.teal .wgt-val { color: var(--teal); }
.wgt-card.green .wgt-val.loss { color: var(--teal2); }
.wgt-card.green .wgt-val.gain { color: var(--red); }
.wgt-card.green .wgt-val { color: var(--muted); }
.wgt-card.gold-c .wgt-val { color: var(--gold); }
.wgt-card.orange-c .wgt-val { color: var(--fire2); }

/* Journey */
.journey-card {
  background: var(--bg2);
  border: 1px solid rgba(0,212,170,0.2);
  border-radius: 18px;
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.journey-card::before {
  content:''; position:absolute; top:0;left:0;right:0; height:2px;
  background: linear-gradient(90deg, var(--teal), var(--gold));
}
.journey-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.journey-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}
.journey-pct {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--teal);
  line-height: 1;
  letter-spacing: -1px;
}
.journey-bar-bg {
  height: 6px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 12px;
}
.journey-bar-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--teal), var(--gold));
  transition: width .7s cubic-bezier(.34,1.56,.64,1);
}
.journey-meta {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

/* weight chart */
.wgt-chart-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  position: relative;
  height: 150px;
  overflow: hidden;
}
.wgt-chart-wrap canvas { width:100%!important; height:100%!important; }
.wgt-chart-empty {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size: 9px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase;
  color: var(--muted);
}

/* weight log rows */
.wgt-list-wrap {
  max-height: 420px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,212,170,0.15) transparent;
}

.wgt-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 6px;
  transition: border-color .2s;
}
.wgt-row:focus-within { border-color: rgba(0,212,170,0.3); }
.wgt-row-date {
  font-size: 0.78rem;
  font-weight: 700;
  min-width: 64px;
  color: var(--muted);
}
.wgt-row-input {
  flex:1;
  padding: 7px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.05);
  background: var(--bg3);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color .2s;
}
.wgt-row-input:focus { border-color: rgba(0,212,170,0.4); }
.wgt-row-input::placeholder { color: rgba(255,255,255,0.08); }

.wgt-row-diff {
  min-width: 64px;
  text-align: center;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border-radius: 8px;
  padding: 5px 6px;
}
.wgt-row-diff.loss { color: var(--teal2); background: rgba(0,212,170,0.1); }
.wgt-row-diff.gain { color: var(--red); background: rgba(255,77,109,0.1); }
.wgt-row-diff.same { color: var(--muted); }
.wgt-row-diff.empty { color: rgba(255,255,255,0.08); }

/* ── Responsive ── */
@media(max-width:480px) {
  .tabs { padding: 16px 12px 0; gap:6px; }
  .panel { padding-left: 12px; padding-right: 12px; }
  .goals-row { grid-template-columns: 1fr; }
  .wgt-goals-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active-cal" onclick="switchTab('cal')">🔥 السعرات</button>
  <button class="tab-btn" onclick="switchTab('bud')">⚖️ الوزن</button>
</div>

<!-- ═══ CALORIES PANEL ═══ -->
<div class="panel active" id="panel-cal">
  <div style="height:16px"></div>

  <div class="goals-row">
    <div class="goal-card fire-card">
      <label>هدف السعرات اليومي</label>
      <div class="goal-input-row">
        <input class="goal-input" type="number" id="cal-goal" placeholder="2500" min="0" oninput="saveCalGoal()" />
        <span class="goal-unit">KCAL</span>
      </div>
    </div>
    <div class="goal-card gold-card">
      <label>هدف البروتين اليومي</label>
      <div class="goal-input-row">
        <input class="goal-input" type="number" id="pro-goal" placeholder="150" min="0" oninput="saveProGoal()" />
        <span class="goal-unit">G</span>
      </div>
    </div>
  </div>

  <div class="summary-strip">
    <div class="strip-card s1">
      <div class="sv" id="sum-total">0</div>
      <div class="sl">إجمالي السعرات</div>
    </div>
    <div class="strip-card s4">
      <div class="sv" id="sum-protein">0<span style="font-size:15px;font-weight:700">g</span></div>
      <div class="sl">إجمالي البروتين</div>
    </div>
  </div>

  <div class="section-label">أيامي · MY DAYS</div>

  <div id="days-container"></div>

  <button class="btn-reset" onclick="resetDay()">↺ إعادة الضبط</button>
</div>

<!-- ═══ WEIGHT PANEL ═══ -->
<div class="panel" id="panel-bud">
  <div style="height:16px"></div>

  <div class="wgt-goals-row">
    <div class="wgt-goal-card">
      <label>وزني الحالي · KG</label>
      <input class="wgt-goal-input" type="number" id="start-weight" placeholder="مثال: 80" step="0.1" oninput="saveGoals()" />
    </div>
    <div class="wgt-goal-card">
      <label>وزني المستهدف · KG</label>
      <input class="wgt-goal-input" type="number" id="target-weight" placeholder="مثال: 70" step="0.1" oninput="saveGoals(); updateWgtSummary()" />
    </div>
  </div>

  <div class="wgt-summary">
    <div class="wgt-card teal">
      <div class="wgt-val" id="w-current">--</div>
      <div class="wgt-lbl">آخر وزن مسجل</div>
    </div>
    <div class="wgt-card green">
      <div class="wgt-val" id="w-diff">--</div>
      <div class="wgt-lbl">الفرق عن البداية</div>
    </div>
    <div class="wgt-card gold-c">
      <div class="wgt-val" id="w-remaining">--</div>
      <div class="wgt-lbl">المتبقي للهدف</div>
    </div>
    <div class="wgt-card orange-c">
      <div class="wgt-val" id="w-weekly">--</div>
      <div class="wgt-lbl">خسارة أسبوعية</div>
    </div>
  </div>

  <div class="journey-card">
    <div class="journey-top">
      <span class="journey-title">🎯 تقدمك نحو الهدف</span>
      <span class="journey-pct" id="journey-pct">0%</span>
    </div>
    <div class="journey-bar-bg">
      <div class="journey-bar-fill" id="journey-bar" style="width:0%"></div>
    </div>
    <div class="journey-meta">
      <span id="journey-start">البداية: --</span>
      <span id="journey-now">الآن: --</span>
      <span id="journey-target">الهدف: --</span>
    </div>
  </div>

  <div class="wgt-chart-wrap">
    <canvas id="wgt-canvas"></canvas>
    <div class="wgt-chart-empty" id="chart-empty">سجّل وزنك لترى منحنى التطور</div>
  </div>

  <div class="section-label">سجلاتي · MY LOG</div>
  <div class="wgt-list-wrap" id="wgt-list"></div>
</div>

<script>
// ─── STORAGE ───
const KEY_CAL = 'trackerCalories_v2';
const KEY_WGT = 'trackerWeight_v2';
const saveCalData = d => { try { localStorage.setItem(KEY_CAL, JSON.stringify(d)); } catch(e){} };
const loadCalData = () => { try { return JSON.parse(localStorage.getItem(KEY_CAL)) || []; } catch(e){ return []; } };
const saveWgtData = d => { try { localStorage.setItem(KEY_WGT, JSON.stringify(d)); } catch(e){} };
const loadWgtData = () => { try { return JSON.parse(localStorage.getItem(KEY_WGT)) || {}; } catch(e){ return {}; } };

// ─── DATES ───
const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DAYS   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(s) {
  const d = new Date(s + 'T00:00:00');
  return `${AR_DAYS[d.getDay()]} ${d.getDate()} ${AR_MONTHS[d.getMonth()]}`;
}

// ─── TABS ───
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if(tab === 'cal') {
    document.querySelectorAll('.tab-btn')[0].className = 'tab-btn active-cal';
    document.getElementById('panel-cal').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].className = 'tab-btn active-bud';
    document.getElementById('panel-bud').classList.add('active');
  }
}

// ─── CALORIE GOAL ───
const KEY_GOAL = 'trackerCalGoal_v1';
let calGoal = parseInt(localStorage.getItem(KEY_GOAL)) || 2500;
function saveCalGoal() {
  const v = parseInt(document.getElementById('cal-goal').value);
  calGoal = isNaN(v) ? 2500 : v;
  localStorage.setItem(KEY_GOAL, calGoal);
  renderDays();
}

// ─── PROTEIN GOAL ───
const KEY_PRO_GOAL = 'trackerProGoal_v1';
let proGoal = parseInt(localStorage.getItem(KEY_PRO_GOAL)) || 150;
function saveProGoal() {
  const v = parseInt(document.getElementById('pro-goal').value);
  proGoal = isNaN(v) ? 150 : v;
  localStorage.setItem(KEY_PRO_GOAL, proGoal);
}

// ─── CALORIES ───
let calDays = loadCalData();
calDays = calDays.map(day => ({
  ...day,
  slots: day.slots.map(s => (typeof s === 'object' && s !== null) ? s : { cal: s, pro: '' })
}));
if(!calDays.length) {
  calDays = [{ id: Date.now(), date: todayStr(), slots: Array(5).fill(null).map(()=>({cal:'',pro:''})) }];
  saveCalData(calDays);
}

function removeDay(id) {
  calDays = calDays.filter(d => d.id !== id);
  saveCalData(calDays);
  renderDays();
}
function resetDay() {
  if(calDays.length > 0) {
    calDays[0].slots = Array(5).fill(null).map(()=>({cal:'',pro:''}));
    saveCalData(calDays);
    renderDays();
  }
}
function addSlot(id) {
  const day = calDays.find(d => d.id === id);
  if(day) { day.slots.push({cal:'',pro:''}); saveCalData(calDays); renderDays(); }
}
function removeSlot(id, idx) {
  const day = calDays.find(d => d.id === id);
  if(day && day.slots.length > 1) { day.slots.splice(idx, 1); saveCalData(calDays); renderDays(); }
}
function updateSlot(id, idx, field, val) {
  const day = calDays.find(d => d.id === id);
  if(day) {
    day.slots[idx][field] = val;
    saveCalData(calDays);
    const totalCal = day.slots.reduce((a, s) => a + (parseFloat(s.cal)||0), 0);
    const totalPro = day.slots.reduce((a, s) => a + (parseFloat(s.pro)||0), 0);
    const badge  = document.querySelector(`[data-badge="${id}"]`);
    const bar    = document.querySelector(`[data-bar="${id}"]`);
    const barPro = document.querySelector(`[data-bar-pro="${id}"]`);
    if(badge) badge.innerHTML = (totalCal > 0 ? totalCal.toLocaleString() : '0') + ' CAL' +
      (totalPro > 0 ? `<span style="color:var(--gold);font-size:11px;display:block;margin-top:1px;font-family:'Cairo',sans-serif;">${totalPro}g PRO</span>` : '');
    if(bar)    bar.style.width    = Math.min((totalCal / (calGoal || 2500)) * 100, 100) + '%';
    if(barPro) barPro.style.width = Math.min((totalPro / (proGoal || 150))  * 100, 100) + '%';
    updateCalSummary();
  }
}

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  calDays.forEach(day => {
    const totalCal = day.slots.reduce((a, s) => a + (parseFloat(s.cal)||0), 0);
    const totalPro = day.slots.reduce((a, s) => a + (parseFloat(s.pro)||0), 0);
    const pct    = Math.min((totalCal / (calGoal || 2500)) * 100, 100);
    const proPct = Math.min((totalPro / (proGoal || 150))  * 100, 100);
    const dayNum = calDays.indexOf(day) + 1;

    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-card-header">
        <div class="day-num">
          <div class="day-pulse"></div>
          يوم ${dayNum}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="day-badge" data-badge="${day.id}">
            ${totalCal > 0 ? totalCal.toLocaleString() : '0'} CAL
            ${totalPro > 0 ? `<span style="color:var(--gold);font-size:11px;display:block;margin-top:1px;font-family:'Cairo',sans-serif;">${totalPro}g PRO</span>` : ''}
          </div>
          <button class="btn-rm-day" onclick="removeDay(${day.id})">✕</button>
        </div>
      </div>
      <div class="day-card-body">

        <div class="sub-label fire">
          <div class="sub-dot"></div>
          السعرات · CALORIES
        </div>
        <div class="slots-grid" id="slots-${day.id}">
          ${day.slots.map((s, i) => `
            <div class="slot-wrap">
              <span class="slot-label">وجبة ${i+1}</span>
              <div class="slot-input-wrap">
                <input class="slot-input cal" type="number" value="${s.cal}" placeholder="0"
                  oninput="updateSlot(${day.id}, ${i}, 'cal', this.value)" min="0" />
                ${day.slots.length > 1 ? `<button class="btn-rm-slot" onclick="removeSlot(${day.id},${i})">✕</button>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
        <div class="prog-wrap">
          <div class="prog-bar fire" data-bar="${day.id}" style="width:${pct}%"></div>
        </div>

        <div class="sub-label gold">
          <div class="sub-dot"></div>
          البروتين · PROTEIN
        </div>
        <div class="slots-grid" id="pro-slots-${day.id}">
          ${day.slots.map((s, i) => `
            <div class="slot-wrap">
              <span class="slot-label" style="color:var(--gold)">وجبة ${i+1}</span>
              <div class="slot-input-wrap">
                <input class="slot-input pro" type="number" value="${s.pro}" placeholder="0"
                  oninput="updateSlot(${day.id}, ${i}, 'pro', this.value)" min="0" />
              </div>
            </div>
          `).join('')}
        </div>
        <div class="prog-wrap">
          <div class="prog-bar gold" data-bar-pro="${day.id}" style="width:${proPct}%"></div>
        </div>

        <div class="day-actions">
          <button class="btn-add-slot" onclick="addSlot(${day.id})">+ وجبة</button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  updateCalSummary();
}

function updateCalSummary() {
  const totalCals = calDays.reduce((a, d) => a + d.slots.reduce((b, s) => b + (parseFloat(s.cal)||0), 0), 0);
  const totalProt = calDays.reduce((a, d) => a + d.slots.reduce((b, s) => b + (parseFloat(s.pro)||0), 0), 0);
  document.getElementById('sum-total').textContent = totalCals.toLocaleString();
  document.getElementById('sum-protein').innerHTML = totalProt.toLocaleString() + '<span style="font-size:15px;font-weight:700">g</span>';
}

// ─── WEIGHT ───
let wgtData = loadWgtData();
if(!wgtData.weights) wgtData.weights = {};
if(!wgtData.startWeight) wgtData.startWeight = null;
if(!wgtData.targetWeight) wgtData.targetWeight = null;

function saveGoals() {
  wgtData.startWeight  = parseFloat(document.getElementById('start-weight').value) || null;
  wgtData.targetWeight = parseFloat(document.getElementById('target-weight').value) || null;
  saveWgtData(wgtData);
  updateWgtSummary();
  drawChart();
}

function updateWeight(dateStr, val) {
  const v = parseFloat(val);
  if(val === '' || isNaN(v)) delete wgtData.weights[dateStr];
  else wgtData.weights[dateStr] = v;
  saveWgtData(wgtData);
  updateWgtSummary();
  drawChart();
  const entries = getSortedEntries();
  const idx = entries.findIndex(e => e[0] === dateStr);
  const diffEl = document.querySelector(`[data-wdiff="${dateStr}"]`);
  if(diffEl) {
    if(idx > 0 && val !== '') {
      const diff = +(v - entries[idx-1][1]).toFixed(1);
      diffEl.textContent = (diff > 0 ? '+' : '') + diff + ' KG';
      diffEl.className = 'wgt-row-diff ' + (diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same');
    } else {
      diffEl.textContent = '--';
      diffEl.className = 'wgt-row-diff empty';
    }
  }
}

function getSortedEntries() {
  return Object.entries(wgtData.weights)
    .filter(([,v]) => v !== null && !isNaN(v))
    .sort((a,b) => a[0].localeCompare(b[0]));
}

function updateWgtSummary() {
  const entries = getSortedEntries();
  const last   = entries.length ? entries[entries.length-1][1] : null;
  const start  = wgtData.startWeight;
  const target = wgtData.targetWeight;

  document.getElementById('w-current').textContent = last !== null ? last + ' KG' : '--';

  const diffEl = document.getElementById('w-diff');
  if(last !== null && start !== null) {
    const d = +(last - start).toFixed(1);
    diffEl.textContent = (d > 0 ? '+' : '') + d + ' KG';
    diffEl.className = 'wgt-val ' + (d < 0 ? 'loss' : d > 0 ? 'gain' : '');
  } else { diffEl.textContent = '--'; diffEl.className = 'wgt-val'; }

  const remEl = document.getElementById('w-remaining');
  if(last !== null && target !== null) {
    const r = +(last - target).toFixed(1);
    if(r <= 0) { remEl.textContent = '🎉 وصلت!'; remEl.className = 'wgt-val'; }
    else { remEl.textContent = r + ' KG'; remEl.className = 'wgt-val'; }
  } else { remEl.textContent = '--'; remEl.className = 'wgt-val'; }

  const weeklyEl = document.getElementById('w-weekly');
  if(entries.length >= 2) {
    const first = entries[0], lastE = entries[entries.length-1];
    const daysDiff = Math.max(1, (new Date(lastE[0]) - new Date(first[0])) / 86400000);
    const totalLoss = first[1] - lastE[1];
    const weeklyLoss = +((totalLoss / daysDiff) * 7).toFixed(2);
    if(weeklyLoss > 0) { weeklyEl.textContent = '-' + weeklyLoss + ' KG'; weeklyEl.style.color = 'var(--teal2)'; }
    else if(weeklyLoss < 0) { weeklyEl.textContent = '+' + Math.abs(weeklyLoss) + ' KG'; weeklyEl.style.color = 'var(--red)'; }
    else { weeklyEl.textContent = '0 KG'; weeklyEl.style.color = 'var(--muted)'; }
  } else { weeklyEl.textContent = '--'; weeklyEl.style.color = ''; }

  const pctEl  = document.getElementById('journey-pct');
  const barEl  = document.getElementById('journey-bar');
  const startM = document.getElementById('journey-start');
  const nowM   = document.getElementById('journey-now');
  const targM  = document.getElementById('journey-target');

  if(start !== null && target !== null && last !== null && start !== target) {
    const totalNeeded = Math.abs(start - target);
    const done = Math.abs(start - last);
    const pct = Math.min(100, Math.round((done / totalNeeded) * 100));
    pctEl.textContent = pct + '%';
    barEl.style.width = pct + '%';
    startM.textContent = 'البداية: ' + start + ' KG';
    nowM.textContent   = 'الآن: ' + last + ' KG';
    targM.textContent  = 'الهدف: ' + target + ' KG';
    pctEl.style.color = pct >= 100 ? 'var(--gold)' : 'var(--teal)';
  } else {
    pctEl.textContent = '0%'; barEl.style.width = '0%';
    startM.textContent = 'البداية: --';
    nowM.textContent   = 'الآن: --';
    targM.textContent  = 'الهدف: --';
  }
}

function drawChart() {
  const canvas  = document.getElementById('wgt-canvas');
  const emptyEl = document.getElementById('chart-empty');
  const entries = getSortedEntries();
  if(entries.length < 2) { emptyEl.style.display = 'flex'; return; }
  emptyEl.style.display = 'none';

  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const vals = entries.map(e => e[1]);
  const minV = Math.min(...vals) - 1, maxV = Math.max(...vals) + 1;
  const pad  = { t:10, r:10, b:28, l:36 };
  const cw   = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const tx   = i => pad.l + (i/(entries.length-1)) * cw;
  const ty   = v => pad.t + ch - ((v-minV)/(maxV-minV)) * ch;

  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  for(let i=0; i<=4; i++) {
    const y = pad.t + (i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '10px Cairo'; ctx.textAlign = 'right';
    ctx.fillText((maxV - i*(maxV-minV)/4).toFixed(1), pad.l-4, y+4);
  }

  if(wgtData.targetWeight) {
    const ty2 = ty(wgtData.targetWeight);
    if(ty2 >= pad.t && ty2 <= pad.t+ch) {
      ctx.setLineDash([4,4]); ctx.strokeStyle = '#00D4AA'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(pad.l, ty2); ctx.lineTo(pad.l+cw, ty2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+ch);
  grad.addColorStop(0, 'rgba(0,212,170,0.18)');
  grad.addColorStop(1, 'rgba(0,212,170,0)');
  ctx.beginPath();
  entries.forEach(([,v],i) => i===0 ? ctx.moveTo(tx(i),ty(v)) : ctx.lineTo(tx(i),ty(v)));
  ctx.lineTo(tx(entries.length-1), pad.t+ch);
  ctx.lineTo(tx(0), pad.t+ch);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath(); ctx.strokeStyle = '#00D4AA'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  entries.forEach(([,v],i) => i===0 ? ctx.moveTo(tx(i),ty(v)) : ctx.lineTo(tx(i),ty(v)));
  ctx.stroke();

  entries.forEach(([,v],i) => {
    ctx.beginPath(); ctx.arc(tx(i), ty(v), 4, 0, Math.PI*2);
    ctx.fillStyle = '#00D4AA'; ctx.fill();
    ctx.strokeStyle = '#06060A'; ctx.lineWidth = 2; ctx.stroke();
  });
}

function generateDates() {
  const dates = [], start = new Date('2026-04-10T00:00:00'), end = new Date('2026-12-31T00:00:00');
  const cur = new Date(start);
  while(cur <= end) { dates.push(cur.toISOString().split('T')[0]); cur.setDate(cur.getDate()+1); }
  return dates;
}
const ALL_DATES = generateDates();

function renderWeight() {
  document.getElementById('start-weight').value  = wgtData.startWeight  || '';
  document.getElementById('target-weight').value = wgtData.targetWeight || '';

  const list = document.getElementById('wgt-list');
  list.innerHTML = '';
  const entries = getSortedEntries();

  ALL_DATES.forEach((dateStr, index) => {
    const w = wgtData.weights[dateStr];
    const sortedIdx = entries.findIndex(e => e[0] === dateStr);
    const dayNum = index + 1;

    let diffHtml = `<div class="wgt-row-diff empty" data-wdiff="${dateStr}">--</div>`;
    if(w !== undefined && sortedIdx > 0) {
      const diff = +(w - entries[sortedIdx-1][1]).toFixed(1);
      const cls  = diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same';
      diffHtml = `<div class="wgt-row-diff ${cls}" data-wdiff="${dateStr}">${diff>0?'+':''}${diff} KG</div>`;
    } else if(w !== undefined) {
      diffHtml = `<div class="wgt-row-diff same" data-wdiff="${dateStr}">--</div>`;
    }

    const row = document.createElement('div');
    row.className = 'wgt-row';
    row.innerHTML = `
      <div class="wgt-row-date">يوم ${dayNum}</div>
      <input class="wgt-row-input" type="number" placeholder="--" value="${w !== undefined ? w : ''}"
        step="0.1" min="0" oninput="updateWeight('${dateStr}', this.value)" />
      ${diffHtml}
    `;
    list.appendChild(row);
  });

  updateWgtSummary();
  setTimeout(drawChart, 50);
}

// ─── INIT ───
document.getElementById('cal-goal').value = calGoal || '';
document.getElementById('pro-goal').value = proGoal || '';
renderDays();
renderWeight();
</script>
</body>
</html>
