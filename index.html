<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --card: #141720;
    --card2: #1a1e2e;
    --border: #252a3d;
    --accent1: #f97316;
    --accent2: #3b82f6;
    --accent1-glow: rgba(249,115,22,0.18);
    --accent2-glow: rgba(59,130,246,0.18);
    --text: #e8eaf2;
    --muted: #6b7280;
    --green: #22c55e;
    --red: #ef4444;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #141720 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  header .logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent1), #fb923c);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 18px var(--accent1-glow);
  }
  header h1 { font-size: 1.25rem; font-weight: 700; }
  header p { font-size: 0.75rem; color: var(--muted); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 20px 28px 0;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 10px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab-btn.active-cal {
    border-color: var(--accent1);
    color: var(--accent1);
    background: var(--accent1-glow);
    box-shadow: 0 0 20px var(--accent1-glow);
  }
  .tab-btn.active-bud {
    border-color: var(--accent2);
    color: var(--accent2);
    background: var(--accent2-glow);
    box-shadow: 0 0 20px var(--accent2-glow);
  }

  /* PANELS */
  .panel { display: none; padding: 20px 28px 40px; }
  .panel.active { display: block; }

  /* ─── CALORIES PANEL ─── */
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  .day-card:focus-within { border-color: var(--accent1); }

  .day-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    cursor: pointer;
    user-select: none;
  }
  .day-label {
    display: flex; align-items: center; gap: 10px;
  }
  .day-label .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent1);
    box-shadow: 0 0 8px var(--accent1);
  }
  .day-label span { font-weight: 700; font-size: 1rem; }
  .day-date { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .day-total-badge {
    background: var(--accent1-glow);
    border: 1px solid var(--accent1);
    color: var(--accent1);
    border-radius: 30px;
    padding: 4px 14px;
    font-size: 0.9rem;
    font-weight: 700;
    min-width: 90px;
    text-align: center;
    transition: all .2s;
  }

  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .slot-wrap { position: relative; }
  .slot-label {
    position: absolute;
    top: -9px; right: 10px;
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--card);
    padding: 0 4px;
  }
  .slot-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--card2);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .slot-input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 3px var(--accent1-glow);
  }
  .slot-input::placeholder { color: var(--border); font-size: 1.1rem; }

  .day-actions {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .btn-add-slot {
    background: none;
    border: 1.5px dashed var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 7px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-add-slot:hover { border-color: var(--accent1); color: var(--accent1); }
  .btn-rm-slot {
    background: none;
    border: none;
    color: var(--red);
    opacity: .5;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-rm-slot:hover { opacity: 1; }

  /* Progress bar */
  .cal-bar-wrap {
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    margin-top: 14px;
    overflow: hidden;
  }
  .cal-bar {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent1), #fb923c);
    transition: width .4s cubic-bezier(.34,1.56,.64,1);
    min-width: 0%;
  }

  /* Add day button */
  .btn-add-day {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1.5px dashed var(--accent1);
    background: var(--accent1-glow);
    color: var(--accent1);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    margin-top: 4px;
  }
  .btn-add-day:hover { background: rgba(249,115,22,.28); }

  /* Summary strip */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .strip-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .strip-card .sv { font-size: 1.5rem; font-weight: 900; }
  .strip-card .sl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .strip-card.s1 .sv { color: var(--accent1); }
  .strip-card.s2 .sv { color: var(--green); }
  .strip-card.s3 .sv { color: var(--accent2); }

  /* ─── WEIGHT PANEL ─── */
  .wgt-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .wgt-sum-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .wgt-sum-card .wv { font-size: 1.4rem; font-weight: 900; }
  .wgt-sum-card .wl { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
  .wgt-sum-card.w1 .wv { color: var(--accent2); }
  .wgt-sum-card.w2 .wv { color: var(--green); }
  .wgt-sum-card.w3 .wv.loss { color: var(--green); }
  .wgt-sum-card.w3 .wv.gain { color: var(--red); }

  /* Goal input */
  .wgt-goal-wrap {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: flex-end; flex-wrap: wrap;
  }
  .wgt-goal-inner { flex: 1; min-width: 140px; }
  .wgt-goal-inner label {
    display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px;
  }
  .wgt-goal-input {
    width: 100%;
    padding: 11px 14px;
    border-radius: 11px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 600;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .wgt-goal-input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px var(--accent2-glow);
  }

  /* Chart */
  .wgt-chart-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    position: relative;
    height: 160px;
  }
  .wgt-chart-wrap canvas { width: 100% !important; height: 100% !important; }
  .wgt-chart-empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.85rem;
  }

  /* Month groups */
  .month-group { margin-bottom: 22px; }
  .month-header {
    font-size: 0.78rem; font-weight: 700;
    color: var(--accent2);
    letter-spacing: .08em;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .month-header::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .wgt-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 7px;
    transition: border-color .2s;
  }
  .wgt-row:focus-within { border-color: var(--accent2); }
  .wgt-row-date {
    font-size: 0.82rem; font-weight: 700;
    min-width: 70px; color: var(--muted);
  }
  .wgt-row-date span { display: block; font-size: 0.68rem; color: var(--border); }
  .wgt-row-input {
    flex: 1;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--card2);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    text-align: center; outline: none;
    transition: border-color .2s;
  }
  .wgt-row-input:focus { border-color: var(--accent2); }
  .wgt-row-input::placeholder { color: var(--border); }
  .wgt-row-diff {
    min-width: 72px; text-align: center;
    font-size: 0.85rem; font-weight: 700;
    border-radius: 8px; padding: 5px 8px;
  }
  .wgt-row-diff.loss { color: var(--green); background: rgba(34,197,94,.12); }
  .wgt-row-diff.gain { color: var(--red); background: rgba(239,68,68,.12); }
  .wgt-row-diff.same { color: var(--muted); }
  .wgt-row-diff.empty { color: var(--border); }

  /* Scrollable list */
  .wgt-list-wrap {
    max-height: 420px; overflow-y: auto;
    padding-left: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* Section titles */
  .section-title {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .ic {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .ic-cal { background: var(--accent1-glow); }
  .ic-bud { background: var(--accent2-glow); }

  /* Responsive */
  @media(max-width:480px) {
    header { padding: 14px 16px; }
    .tabs, .panel { padding-left: 14px; padding-right: 14px; }
    .summary-strip, .bud-summary { grid-template-columns: 1fr 1fr; }
    .summary-strip .strip-card:last-child,
    .bud-summary .bud-sum-card:last-child { grid-column: span 2; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔥</div>
  <div>
    <h1>متتبعي اليومي</h1>
    <p>السعرات الحرارية · الوزن</p>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active-cal" onclick="switchTab('cal')">🔥 السعرات</button>
  <button class="tab-btn" onclick="switchTab('bud')">⚖️ الوزن</button>
</div>

<!-- ═══ CALORIES PANEL ═══ -->
<div class="panel active" id="panel-cal">

  <div style="height:18px"></div>

  <div class="summary-strip">
    <div class="strip-card s1">
      <div class="sv" id="sum-total">0</div>
      <div class="sl">إجمالي السعرات</div>
    </div>
    <div class="strip-card s2">
      <div class="sv" id="sum-days">0</div>
      <div class="sl">أيام مسجلة</div>
    </div>
    <div class="strip-card s3">
      <div class="sv" id="sum-avg">0</div>
      <div class="sl">معدل يومي</div>
    </div>
  </div>

  <div class="section-title">
    <div class="ic ic-cal">📅</div>
    أيامي
  </div>

  <div id="days-container"></div>

  <button class="btn-add-day" onclick="addDay()">+ إضافة يوم جديد</button>
</div>

<!-- ═══ WEIGHT PANEL ═══ -->
<div class="panel" id="panel-bud">

  <div style="height:18px"></div>

  <div class="wgt-goal-wrap">
    <div class="wgt-goal-inner">
      <label>⚖️ وزني الحالي (كغ)</label>
      <input class="wgt-goal-input" type="number" id="start-weight" placeholder="مثال: 80" step="0.1" oninput="saveGoals()" />
    </div>
    <div class="wgt-goal-inner">
      <label>🎯 وزني المستهدف (كغ)</label>
      <input class="wgt-goal-input" type="number" id="target-weight" placeholder="مثال: 70" step="0.1" oninput="saveGoals(); updateWgtSummary()" />
    </div>
  </div>

  <div class="wgt-summary">
    <div class="wgt-sum-card w1">
      <div class="wv" id="w-current">--</div>
      <div class="wl">آخر وزن مسجل</div>
    </div>
    <div class="wgt-sum-card w2">
      <div class="wv" id="w-diff">--</div>
      <div class="wl">الفرق عن البداية</div>
    </div>
    <div class="wgt-sum-card w3">
      <div class="wv loss" id="w-remaining">--</div>
      <div class="wl">المتبقي للهدف</div>
    </div>
  </div>

  <!-- Mini chart -->
  <div class="wgt-chart-wrap">
    <canvas id="wgt-canvas"></canvas>
    <div class="wgt-chart-empty" id="chart-empty">سجّل وزنك لترى منحنى التطور 📈</div>
  </div>

  <div class="section-title">
    <div class="ic ic-bud">📆</div>
    من 10 أبريل إلى 31 ديسمبر 2026
  </div>

  <div class="wgt-list-wrap" id="wgt-list"></div>

</div>

<script>
// ──────────────────────────────────────────────
//  STORAGE HELPERS
// ──────────────────────────────────────────────
const KEY_CAL = 'trackerCalories_v2';

function saveCalData(data) {
  try { localStorage.setItem(KEY_CAL, JSON.stringify(data)); } catch(e){}
}
function loadCalData() {
  try { return JSON.parse(localStorage.getItem(KEY_CAL)) || []; } catch(e){ return []; }
}

// ──────────────────────────────────────────────
//  ARABIC MONTH NAMES
// ──────────────────────────────────────────────
const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو',
                   'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${AR_DAYS[d.getDay()]} ${d.getDate()} ${AR_MONTHS[d.getMonth()]}`;
}

// ──────────────────────────────────────────────
//  TABS
// ──────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if(tab === 'cal') {
    document.querySelectorAll('.tab-btn')[0].className = 'tab-btn active-cal';
    document.getElementById('panel-cal').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].className = 'tab-btn active-bud';
    document.getElementById('panel-bud').classList.add('active');
  }
}

// ──────────────────────────────────────────────
//  CALORIES
// ──────────────────────────────────────────────
let calDays = loadCalData();
if(calDays.length === 0) {
  calDays = [{ id: Date.now(), date: todayStr(), slots: ['','','','',''] }];
  saveCalData(calDays);
}

function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function addDay() {
  const newDay = { id: Date.now(), date: todayStr(), slots: ['','','','',''] };
  calDays.unshift(newDay);
  saveCalData(calDays);
  renderDays();
}

function removeDay(id) {
  calDays = calDays.filter(d => d.id !== id);
  saveCalData(calDays);
  renderDays();
}

function addSlot(id) {
  const day = calDays.find(d => d.id === id);
  if(day) { day.slots.push(''); saveCalData(calDays); renderDays(); }
}

function removeSlot(id, idx) {
  const day = calDays.find(d => d.id === id);
  if(day && day.slots.length > 1) {
    day.slots.splice(idx, 1);
    saveCalData(calDays);
    renderDays();
  }
}

function updateSlot(id, idx, val) {
  const day = calDays.find(d => d.id === id);
  if(day) {
    day.slots[idx] = val;
    saveCalData(calDays);
    // live update badge + bar without full re-render
    const total = day.slots.reduce((a, v) => a + (parseFloat(v) || 0), 0);
    const badge = document.querySelector(`[data-badge="${id}"]`);
    const bar = document.querySelector(`[data-bar="${id}"]`);
    if(badge) badge.textContent = total > 0 ? total.toLocaleString() + ' سعرة' : '0 سعرة';
    if(bar) bar.style.width = Math.min((total / 3000) * 100, 100) + '%';
    updateCalSummary();
  }
}

function updateDateForDay(id, val) {
  const day = calDays.find(d => d.id === id);
  if(day) { day.date = val; saveCalData(calDays); }
}

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  calDays.forEach(day => {
    const total = day.slots.reduce((a, v) => a + (parseFloat(v) || 0), 0);
    const pct = Math.min((total / 3000) * 100, 100);

    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-card-header">
        <div class="day-label">
          <div class="dot"></div>
          <div>
            <div style="display:flex;align-items:center;gap:8px">
              <span>يوم</span>
              <input type="date" value="${day.date}" 
                style="background:transparent;border:none;color:var(--muted);font-family:'Cairo',sans-serif;font-size:0.78rem;outline:none;cursor:pointer"
                onchange="updateDateForDay(${day.id}, this.value)" />
            </div>
            <div class="day-date">${formatDate(day.date)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="day-total-badge" data-badge="${day.id}">${total > 0 ? total.toLocaleString() + ' سعرة' : '0 سعرة'}</div>
          <button onclick="removeDay(${day.id})" style="background:none;border:none;color:var(--red);opacity:.5;font-size:1.1rem;cursor:pointer;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5">✕</button>
        </div>
      </div>
      <div class="slots-grid" id="slots-${day.id}">
        ${day.slots.map((v, i) => `
          <div class="slot-wrap">
            <span class="slot-label">وجبة ${i + 1}</span>
            <div style="display:flex;align-items:center;gap:4px">
              <input class="slot-input" type="number" value="${v}" placeholder="0"
                oninput="updateSlot(${day.id}, ${i}, this.value)"
                min="0" />
              ${day.slots.length > 1 ? `<button class="btn-rm-slot" onclick="removeSlot(${day.id},${i})">✕</button>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="day-actions">
        <button class="btn-add-slot" onclick="addSlot(${day.id})">+ وجبة</button>
      </div>
      <div class="cal-bar-wrap">
        <div class="cal-bar" data-bar="${day.id}" style="width:${pct}%"></div>
      </div>
    `;
    container.appendChild(card);
  });
  updateCalSummary();
}

function updateCalSummary() {
  const daysWithData = calDays.filter(d => d.slots.some(v => parseFloat(v) > 0));
  const totalCals = calDays.reduce((a, d) => a + d.slots.reduce((b, v) => b + (parseFloat(v)||0), 0), 0);
  const avg = daysWithData.length ? Math.round(totalCals / daysWithData.length) : 0;
  document.getElementById('sum-total').textContent = totalCals.toLocaleString();
  document.getElementById('sum-days').textContent = daysWithData.length;
  document.getElementById('sum-avg').textContent = avg.toLocaleString();
}

// ──────────────────────────────────────────────
//  WEIGHT TRACKING
// ──────────────────────────────────────────────
const KEY_WGT = 'trackerWeight_v2';
function saveWgtData(d) { try { localStorage.setItem(KEY_WGT, JSON.stringify(d)); } catch(e){} }
function loadWgtData() { try { return JSON.parse(localStorage.getItem(KEY_WGT)) || {}; } catch(e){ return {}; } }

let wgtData = loadWgtData();
if(!wgtData.weights) wgtData.weights = {};
if(!wgtData.startWeight) wgtData.startWeight = null;
if(!wgtData.targetWeight) wgtData.targetWeight = null;

function saveGoals() {
  wgtData.startWeight = parseFloat(document.getElementById('start-weight').value) || null;
  wgtData.targetWeight = parseFloat(document.getElementById('target-weight').value) || null;
  saveWgtData(wgtData);
  updateWgtSummary();
}

function updateWeight(dateStr, val) {
  const v = parseFloat(val);
  if(val === '' || isNaN(v)) delete wgtData.weights[dateStr];
  else wgtData.weights[dateStr] = v;
  saveWgtData(wgtData);
  updateWgtSummary();
  drawChart();
  // live diff update
  const entries = getSortedEntries();
  const idx = entries.findIndex(e => e[0] === dateStr);
  const diffEl = document.querySelector(`[data-wdiff="${dateStr}"]`);
  if(diffEl) {
    if(idx > 0 && val !== '') {
      const prev = entries[idx-1][1];
      const cur = v;
      const diff = +(cur - prev).toFixed(1);
      diffEl.textContent = (diff > 0 ? '+' : '') + diff + ' كغ';
      diffEl.className = 'wgt-row-diff ' + (diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same');
    } else {
      diffEl.textContent = '--';
      diffEl.className = 'wgt-row-diff empty';
    }
  }
}

function getSortedEntries() {
  return Object.entries(wgtData.weights)
    .filter(([,v]) => v !== null && !isNaN(v))
    .sort((a,b) => a[0].localeCompare(b[0]));
}

function updateWgtSummary() {
  const entries = getSortedEntries();
  const last = entries.length ? entries[entries.length-1][1] : null;
  const start = wgtData.startWeight;
  const target = wgtData.targetWeight;

  document.getElementById('w-current').textContent = last !== null ? last + ' كغ' : '--';

  const diffEl = document.getElementById('w-diff');
  if(last !== null && start !== null) {
    const d = +(last - start).toFixed(1);
    diffEl.textContent = (d > 0 ? '+' : '') + d + ' كغ';
    diffEl.className = 'wv ' + (d < 0 ? 'loss' : d > 0 ? 'gain' : '');
  } else { diffEl.textContent = '--'; diffEl.className = 'wv'; }

  const remEl = document.getElementById('w-remaining');
  if(last !== null && target !== null) {
    const r = +(last - target).toFixed(1);
    if(r <= 0) { remEl.textContent = '🎉 وصلت!'; remEl.className = 'wv loss'; }
    else { remEl.textContent = r + ' كغ'; remEl.className = 'wv loss'; }
  } else { remEl.textContent = '--'; remEl.className = 'wv'; }
}

function drawChart() {
  const canvas = document.getElementById('wgt-canvas');
  const emptyEl = document.getElementById('chart-empty');
  const entries = getSortedEntries();
  if(entries.length < 2) { emptyEl.style.display = 'flex'; return; }
  emptyEl.style.display = 'none';

  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth; const H = canvas.offsetHeight;
  canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const vals = entries.map(e => e[1]);
  const minV = Math.min(...vals) - 1;
  const maxV = Math.max(...vals) + 1;
  const pad = { t: 10, r: 10, b: 30, l: 36 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

  const tx = i => pad.l + (i / (entries.length - 1)) * cw;
  const ty = v => pad.t + ch - ((v - minV) / (maxV - minV)) * ch;

  // Grid lines
  ctx.strokeStyle = '#252a3d'; ctx.lineWidth = 1;
  for(let i = 0; i <= 4; i++) {
    const y = pad.t + (i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
    const label = (maxV - i*(maxV-minV)/4).toFixed(1);
    ctx.fillStyle = '#6b7280'; ctx.font = '10px Cairo'; ctx.textAlign = 'right';
    ctx.fillText(label, pad.l - 4, y + 4);
  }

  // Target line
  if(wgtData.targetWeight) {
    const ty2 = ty(wgtData.targetWeight);
    if(ty2 >= pad.t && ty2 <= pad.t+ch) {
      ctx.setLineDash([4,4]); ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(pad.l, ty2); ctx.lineTo(pad.l+cw, ty2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Area fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+ch);
  grad.addColorStop(0, 'rgba(59,130,246,0.28)');
  grad.addColorStop(1, 'rgba(59,130,246,0)');
  ctx.beginPath();
  entries.forEach(([,v], i) => { i===0 ? ctx.moveTo(tx(i),ty(v)) : ctx.lineTo(tx(i),ty(v)); });
  ctx.lineTo(tx(entries.length-1), pad.t+ch);
  ctx.lineTo(tx(0), pad.t+ch); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  entries.forEach(([,v], i) => { i===0 ? ctx.moveTo(tx(i),ty(v)) : ctx.lineTo(tx(i),ty(v)); });
  ctx.stroke();

  // Dots
  entries.forEach(([,v], i) => {
    ctx.beginPath(); ctx.arc(tx(i), ty(v), 4, 0, Math.PI*2);
    ctx.fillStyle = '#3b82f6'; ctx.fill();
    ctx.strokeStyle = '#0d0f14'; ctx.lineWidth = 2; ctx.stroke();
  });
}

function generateDates() {
  const dates = [];
  const start = new Date('2026-04-10T00:00:00');
  const end   = new Date('2026-12-31T00:00:00');
  const cur = new Date(start);
  while(cur <= end) { dates.push(cur.toISOString().split('T')[0]); cur.setDate(cur.getDate()+1); }
  return dates;
}
const ALL_DATES = generateDates();

function renderWeight() {
  document.getElementById('start-weight').value = wgtData.startWeight || '';
  document.getElementById('target-weight').value = wgtData.targetWeight || '';

  const list = document.getElementById('wgt-list');
  list.innerHTML = '';

  const groups = {};
  ALL_DATES.forEach(d => { const m = d.slice(0,7); if(!groups[m]) groups[m]=[]; groups[m].push(d); });
  const entries = getSortedEntries();

  Object.entries(groups).forEach(([monthKey, dates]) => {
    const [y, mo] = monthKey.split('-');
    const group = document.createElement('div');
    group.className = 'month-group';
    group.innerHTML = `<div class="month-header">${AR_MONTHS[parseInt(mo)-1]} ${y}</div>`;

    dates.forEach(dateStr => {
      const w = wgtData.weights[dateStr];
      const d = new Date(dateStr + 'T00:00:00');

      // calc diff from previous entry
      const sortedIdx = entries.findIndex(e => e[0] === dateStr);
      let diffHtml = '<div class="wgt-row-diff empty" data-wdiff="' + dateStr + '">--</div>';
      if(w !== undefined && sortedIdx > 0) {
        const prev = entries[sortedIdx-1][1];
        const diff = +(w - prev).toFixed(1);
        const cls = diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same';
        diffHtml = `<div class="wgt-row-diff ${cls}" data-wdiff="${dateStr}">${diff>0?'+':''}${diff} كغ</div>`;
      } else if(w !== undefined) {
        diffHtml = `<div class="wgt-row-diff same" data-wdiff="${dateStr}">--</div>`;
      }

      const row = document.createElement('div');
      row.className = 'wgt-row';
      row.innerHTML = `
        <div class="wgt-row-date">
          ${d.getDate()} ${AR_MONTHS[d.getMonth()]}
          <span>${AR_DAYS[d.getDay()]}</span>
        </div>
        <input class="wgt-row-input" type="number" placeholder="--" value="${w !== undefined ? w : ''}"
          step="0.1" min="0"
          oninput="updateWeight('${dateStr}', this.value)" />
        ${diffHtml}
      `;
      group.appendChild(row);
    });
    list.appendChild(group);
  });

  updateWgtSummary();
  setTimeout(drawChart, 50);
}

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
renderDays();
renderWeight();
</script>
</body>
</html>
