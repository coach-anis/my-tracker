<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080808">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold2: #E8C97A;
  --dark: #080808;
  --dark2: #0F0F0F;
  --dark3: #161616;
  --dark4: #1C1C1C;
  --text: #EFEFEF;
  --dim: #666;
  --border: rgba(201,168,76,0.15);
  --border2: rgba(255,255,255,0.05);
  --orange: #E8A87A;
  --blue: #7AB8E8;
  --green: #7AE8B8;
  --red: #E87A7A;
  --orange-glow: rgba(232,168,122,0.12);
  --blue-glow: rgba(122,184,232,0.12);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise texture overlay */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999;
}

.bg-glow {
  position:fixed; inset:0;
  background: radial-gradient(ellipse 60% 35% at 50% -5%, rgba(201,168,76,0.08) 0%, transparent 65%);
  pointer-events:none; z-index:0;
}

/* ─── HEADER ─── */
header {
  text-align:center;
  padding: 44px 24px 28px;
  position: relative;
  z-index: 1;
  border-bottom: 1px solid var(--border);
}

.header-tag {
  font-family:'Bebas Neue', sans-serif;
  letter-spacing: 6px;
  font-size: 10px;
  color: var(--gold);
  opacity: 0.55;
  margin-bottom: 10px;
}

header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 9vw, 60px);
  letter-spacing: 2px;
  line-height: 0.92;
  margin-bottom: 8px;
}

header h1 span { color: var(--gold); }

header p {
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 0.5px;
}

.header-line {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 14px auto 0;
}

/* ─── TABS ─── */
.tabs {
  display: flex;
  gap: 0;
  padding: 24px 20px 0;
  position: relative;
  z-index: 1;
  max-width: 600px;
  margin: 0 auto;
}

.tab-btn {
  flex: 1;
  padding: 13px 12px;
  border: 1px solid var(--border);
  background: var(--dark2);
  color: var(--dim);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}

.tab-btn:first-child { border-radius: 10px 0 0 10px; border-left: 1px solid var(--border); }
.tab-btn:last-child  { border-radius: 0 10px 10px 0; border-right: 1px solid var(--border); border-left: none; }

.tab-btn::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform .25s;
}

.tab-btn.active-cal {
  background: rgba(232,168,122,0.08);
  color: var(--orange);
  border-color: rgba(232,168,122,0.3);
}
.tab-btn.active-cal::before { transform: scaleX(1); background: var(--orange); }

.tab-btn.active-bud {
  background: rgba(122,184,232,0.08);
  color: var(--blue);
  border-color: rgba(122,184,232,0.3);
}
.tab-btn.active-bud::before { transform: scaleX(1); background: var(--blue); }

/* ─── PANELS ─── */
.panel { display:none; padding: 24px 20px 60px; position:relative; z-index:1; max-width:700px; margin:0 auto; }
.panel.active { display:block; }

/* ─── SUMMARY STRIP ─── */
.summary-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

.strip-card {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.strip-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.strip-card.s1::before { background: var(--orange); }
.strip-card.s2::before { background: var(--green); }
.strip-card.s3::before { background: var(--blue); }

.strip-card .sv {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  line-height: 1;
  margin-bottom: 4px;
}
.strip-card .sl {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.5px;
}
.strip-card.s1 .sv { color: var(--orange); }
.strip-card.s2 .sv { color: var(--green); }
.strip-card.s3 .sv { color: var(--blue); }

/* ─── SECTION TITLE ─── */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold);
  opacity: 0.55;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--border);
}

/* ─── DAY CARD ─── */
.day-card {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color .2s;
}
.day-card:focus-within { border-color: rgba(232,168,122,0.4); }

.day-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  background: var(--dark3);
  border-bottom: 1px solid var(--border2);
  cursor: pointer;
  user-select: none;
}

.day-label {
  display: flex;
  align-items: center;
  gap: 10px;
}

.day-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--orange);
  box-shadow: 0 0 8px rgba(232,168,122,0.5);
  flex-shrink: 0;
}

.day-label-text span {
  font-weight: 700;
  font-size: 0.92rem;
}
.day-date-sub {
  font-size: 0.7rem;
  color: var(--dim);
  margin-top: 2px;
}

.day-total-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 1px;
  color: var(--orange);
  background: rgba(232,168,122,0.1);
  border: 1px solid rgba(232,168,122,0.25);
  border-radius: 20px;
  padding: 4px 14px;
  min-width: 80px;
  text-align: center;
}

.day-card-body { padding: 16px 18px; }

.slots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.slot-wrap { position: relative; }
.slot-label {
  position: absolute;
  top: -8px; right: 8px;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--dim);
  background: var(--dark2);
  padding: 0 4px;
  font-family: 'Bebas Neue', sans-serif;
}

.slot-input-wrap { display: flex; align-items: center; gap: 4px; }

.slot-input {
  width: 100%;
  padding: 10px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.07);
  background: var(--dark3);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.slot-input:focus {
  border-color: rgba(232,168,122,0.4);
  box-shadow: 0 0 0 3px rgba(232,168,122,0.08);
}
.slot-input::placeholder { color: rgba(255,255,255,0.12); }

.day-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

.btn-add-slot {
  background: none;
  border: 1px dashed rgba(255,255,255,0.1);
  color: var(--dim);
  border-radius: 8px;
  padding: 7px 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 0.5px;
}
.btn-add-slot:hover { border-color: var(--orange); color: var(--orange); }

.btn-rm-slot {
  background: none;
  border: none;
  color: var(--red);
  opacity: .35;
  font-size: 0.9rem;
  cursor: pointer;
  transition: opacity .2s;
  flex-shrink: 0;
}
.btn-rm-slot:hover { opacity: 1; }

/* Progress bar */
.cal-bar-wrap {
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  margin-top: 16px;
  overflow: hidden;
}
.cal-bar {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, var(--orange), #E8C97A);
  transition: width .4s cubic-bezier(.34,1.56,.64,1);
}

/* Add day button */
.btn-add-day {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px dashed rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.04);
  color: var(--gold);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.btn-add-day:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }

.btn-rm-day {
  background: none;
  border: none;
  color: var(--red);
  opacity: .35;
  font-size: 1rem;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-rm-day:hover { opacity: 1; }

/* ─── WEIGHT PANEL ─── */
.wgt-goal-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.wgt-goal-inner {
  flex: 1;
  min-width: 130px;
}

.wgt-goal-inner label {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--dim);
  margin-bottom: 7px;
}

.wgt-goal-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--dark2);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.wgt-goal-input:focus {
  border-color: rgba(122,184,232,0.4);
  box-shadow: 0 0 0 3px rgba(122,184,232,0.08);
}

/* Weight summary */
.wgt-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.wgt-sum-card {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.wgt-sum-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.wgt-sum-card.w1::before { background: var(--blue); }
.wgt-sum-card.w2::before { background: var(--green); }
.wgt-sum-card.w3::before { background: var(--gold); }

.wgt-sum-card .wv {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; line-height: 1;
  margin-bottom: 4px;
}
.wgt-sum-card .wl { font-size: 10px; color: var(--dim); }
.wgt-sum-card.w1 .wv { color: var(--blue); }
.wgt-sum-card.w2 .wv.loss { color: var(--green); }
.wgt-sum-card.w2 .wv.gain { color: var(--red); }
.wgt-sum-card.w3 .wv { color: var(--gold); }

/* Chart */
.wgt-chart-wrap {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
  position: relative;
  height: 155px;
  overflow: hidden;
}
.wgt-chart-wrap canvas { width:100% !important; height:100% !important; }
.wgt-chart-empty {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 0.82rem;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px; font-size: 11px;
}

/* Month groups */
.month-group { margin-bottom: 20px; }
.month-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--blue);
  opacity: 0.7;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.month-header::after {
  content:''; flex:1; height:1px; background: var(--border);
}

.wgt-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--dark2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  margin-bottom: 6px;
  transition: border-color .2s;
}
.wgt-row:focus-within { border-color: rgba(122,184,232,0.3); }

.wgt-row-date {
  font-size: 0.8rem;
  font-weight: 700;
  min-width: 68px;
  color: var(--dim);
}
.wgt-row-date span {
  display: block;
  font-size: 0.64rem;
  color: rgba(255,255,255,0.15);
  margin-top: 1px;
}

.wgt-row-input {
  flex: 1;
  padding: 7px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--dark3);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color .2s;
}
.wgt-row-input:focus { border-color: rgba(122,184,232,0.4); }
.wgt-row-input::placeholder { color: rgba(255,255,255,0.1); }

.wgt-row-diff {
  min-width: 68px;
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 1px;
  border-radius: 6px;
  padding: 5px 7px;
}
.wgt-row-diff.loss { color: var(--green); background: rgba(122,232,184,0.1); }
.wgt-row-diff.gain { color: var(--red);   background: rgba(232,122,122,0.1); }
.wgt-row-diff.same { color: var(--dim); }
.wgt-row-diff.empty { color: rgba(255,255,255,0.1); }

.wgt-list-wrap {
  max-height: 420px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,168,76,0.2) transparent;
}

/* ─── Responsive ─── */
@media(max-width:480px) {
  .tabs { padding: 20px 14px 0; }
  .panel { padding-left: 14px; padding-right: 14px; }
  .summary-strip, .wgt-summary { grid-template-columns: 1fr 1fr; }
  .summary-strip .strip-card:last-child,
  .wgt-summary .wgt-sum-card:last-child { grid-column: span 2; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<header>
  <div class="header-tag">DAILY TRACKER · CALORIES · WEIGHT</div>
  <h1>متتبعي<br><span>اليومي</span></h1>
  <p>السعرات الحرارية · متابعة الوزن</p>
  <div class="header-line"></div>
</header>

<div class="tabs">
  <button class="tab-btn active-cal" onclick="switchTab('cal')">🔥 السعرات</button>
  <button class="tab-btn" onclick="switchTab('bud')">⚖️ الوزن</button>
</div>

<!-- ═══ CALORIES PANEL ═══ -->
<div class="panel active" id="panel-cal">

  <div style="height:20px"></div>

  <div class="summary-strip">
    <div class="strip-card s1">
      <div class="sv" id="sum-total">0</div>
      <div class="sl">إجمالي السعرات</div>
    </div>
    <div class="strip-card s2">
      <div class="sv" id="sum-days">0</div>
      <div class="sl">أيام مسجلة</div>
    </div>
    <div class="strip-card s3">
      <div class="sv" id="sum-avg">0</div>
      <div class="sl">معدل يومي</div>
    </div>
  </div>

  <div class="section-title">أيامي · MY DAYS</div>

  <div id="days-container"></div>

  <button class="btn-add-day" onclick="addDay()">+ إضافة يوم جديد</button>
</div>

<!-- ═══ WEIGHT PANEL ═══ -->
<div class="panel" id="panel-bud">

  <div style="height:20px"></div>

  <div class="wgt-goal-wrap">
    <div class="wgt-goal-inner">
      <label>وزني الحالي · KG</label>
      <input class="wgt-goal-input" type="number" id="start-weight" placeholder="مثال: 80" step="0.1" oninput="saveGoals()" />
    </div>
    <div class="wgt-goal-inner">
      <label>وزني المستهدف · KG</label>
      <input class="wgt-goal-input" type="number" id="target-weight" placeholder="مثال: 70" step="0.1" oninput="saveGoals(); updateWgtSummary()" />
    </div>
  </div>

  <div class="wgt-summary">
    <div class="wgt-sum-card w1">
      <div class="wv" id="w-current">--</div>
      <div class="wl">آخر وزن مسجل</div>
    </div>
    <div class="wgt-sum-card w2">
      <div class="wv" id="w-diff">--</div>
      <div class="wl">الفرق عن البداية</div>
    </div>
    <div class="wgt-sum-card w3">
      <div class="wv" id="w-remaining">--</div>
      <div class="wl">المتبقي للهدف</div>
    </div>
  </div>

  <div class="wgt-chart-wrap">
    <canvas id="wgt-canvas"></canvas>
    <div class="wgt-chart-empty" id="chart-empty">سجّل وزنك لترى منحنى التطور</div>
  </div>

  <div class="section-title">من 10 أبريل إلى 31 ديسمبر 2026</div>

  <div class="wgt-list-wrap" id="wgt-list"></div>
</div>

<script>
// ─── STORAGE ───
const KEY_CAL = 'trackerCalories_v2';
const KEY_WGT = 'trackerWeight_v2';
const saveCalData = d => { try { localStorage.setItem(KEY_CAL, JSON.stringify(d)); } catch(e){} };
const loadCalData = () => { try { return JSON.parse(localStorage.getItem(KEY_CAL)) || []; } catch(e){ return []; } };
const saveWgtData = d => { try { localStorage.setItem(KEY_WGT, JSON.stringify(d)); } catch(e){} };
const loadWgtData = () => { try { return JSON.parse(localStorage.getItem(KEY_WGT)) || {}; } catch(e){ return {}; } };

// ─── DATES ───
const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DAYS   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(s) {
  const d = new Date(s + 'T00:00:00');
  return `${AR_DAYS[d.getDay()]} ${d.getDate()} ${AR_MONTHS[d.getMonth()]}`;
}

// ─── TABS ───
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if(tab === 'cal') {
    document.querySelectorAll('.tab-btn')[0].className = 'tab-btn active-cal';
    document.getElementById('panel-cal').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].className = 'tab-btn active-bud';
    document.getElementById('panel-bud').classList.add('active');
  }
}

// ─── CALORIES ───
let calDays = loadCalData();
if(!calDays.length) {
  calDays = [{ id: Date.now(), date: todayStr(), slots: ['','','','',''] }];
  saveCalData(calDays);
}

function addDay() {
  calDays.unshift({ id: Date.now(), date: todayStr(), slots: ['','','','',''] });
  saveCalData(calDays);
  renderDays();
}
function removeDay(id) {
  calDays = calDays.filter(d => d.id !== id);
  saveCalData(calDays);
  renderDays();
}
function addSlot(id) {
  const day = calDays.find(d => d.id === id);
  if(day) { day.slots.push(''); saveCalData(calDays); renderDays(); }
}
function removeSlot(id, idx) {
  const day = calDays.find(d => d.id === id);
  if(day && day.slots.length > 1) { day.slots.splice(idx, 1); saveCalData(calDays); renderDays(); }
}
function updateSlot(id, idx, val) {
  const day = calDays.find(d => d.id === id);
  if(day) {
    day.slots[idx] = val;
    saveCalData(calDays);
    const total = day.slots.reduce((a, v) => a + (parseFloat(v)||0), 0);
    const badge = document.querySelector(`[data-badge="${id}"]`);
    const bar   = document.querySelector(`[data-bar="${id}"]`);
    if(badge) badge.textContent = total > 0 ? total.toLocaleString() + ' CAL' : '0 CAL';
    if(bar) bar.style.width = Math.min((total/3000)*100, 100) + '%';
    updateCalSummary();
  }
}
function updateDateForDay(id, val) {
  const day = calDays.find(d => d.id === id);
  if(day) { day.date = val; saveCalData(calDays); }
}

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  calDays.forEach(day => {
    const total = day.slots.reduce((a, v) => a + (parseFloat(v)||0), 0);
    const pct = Math.min((total/3000)*100, 100);
    const card = document.createElement('div');
    card.className = 'day-card';
    card.innerHTML = `
      <div class="day-card-header">
        <div class="day-label">
          <div class="day-dot"></div>
          <div class="day-label-text">
            <div style="display:flex;align-items:center;gap:8px">
              <span>يوم</span>
              <input type="date" value="${day.date}"
                style="background:transparent;border:none;color:var(--dim);font-family:'Cairo',sans-serif;font-size:0.72rem;outline:none;cursor:pointer"
                onchange="updateDateForDay(${day.id}, this.value)" />
            </div>
            <div class="day-date-sub">${formatDate(day.date)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="day-total-badge" data-badge="${day.id}">${total > 0 ? total.toLocaleString() + ' CAL' : '0 CAL'}</div>
          <button class="btn-rm-day" onclick="removeDay(${day.id})">✕</button>
        </div>
      </div>
      <div class="day-card-body">
        <div class="slots-grid" id="slots-${day.id}">
          ${day.slots.map((v, i) => `
            <div class="slot-wrap">
              <span class="slot-label">وجبة ${i+1}</span>
              <div class="slot-input-wrap">
                <input class="slot-input" type="number" value="${v}" placeholder="0"
                  oninput="updateSlot(${day.id}, ${i}, this.value)" min="0" />
                ${day.slots.length > 1 ? `<button class="btn-rm-slot" onclick="removeSlot(${day.id},${i})">✕</button>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
        <div class="day-actions">
          <button class="btn-add-slot" onclick="addSlot(${day.id})">+ وجبة</button>
        </div>
        <div class="cal-bar-wrap">
          <div class="cal-bar" data-bar="${day.id}" style="width:${pct}%"></div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  updateCalSummary();
}

function updateCalSummary() {
  const daysWithData = calDays.filter(d => d.slots.some(v => parseFloat(v) > 0));
  const totalCals = calDays.reduce((a, d) => a + d.slots.reduce((b, v) => b + (parseFloat(v)||0), 0), 0);
  const avg = daysWithData.length ? Math.round(totalCals / daysWithData.length) : 0;
  document.getElementById('sum-total').textContent = totalCals.toLocaleString();
  document.getElementById('sum-days').textContent  = daysWithData.length;
  document.getElementById('sum-avg').textContent   = avg.toLocaleString();
}

// ─── WEIGHT ───
let wgtData = loadWgtData();
if(!wgtData.weights) wgtData.weights = {};
if(!wgtData.startWeight) wgtData.startWeight = null;
if(!wgtData.targetWeight) wgtData.targetWeight = null;

function saveGoals() {
  wgtData.startWeight  = parseFloat(document.getElementById('start-weight').value) || null;
  wgtData.targetWeight = parseFloat(document.getElementById('target-weight').value) || null;
  saveWgtData(wgtData);
  updateWgtSummary();
}

function updateWeight(dateStr, val) {
  const v = parseFloat(val);
  if(val === '' || isNaN(v)) delete wgtData.weights[dateStr];
  else wgtData.weights[dateStr] = v;
  saveWgtData(wgtData);
  updateWgtSummary();
  drawChart();
  const entries = getSortedEntries();
  const idx = entries.findIndex(e => e[0] === dateStr);
  const diffEl = document.querySelector(`[data-wdiff="${dateStr}"]`);
  if(diffEl) {
    if(idx > 0 && val !== '') {
      const diff = +(v - entries[idx-1][1]).toFixed(1);
      diffEl.textContent = (diff > 0 ? '+' : '') + diff + ' KG';
      diffEl.className = 'wgt-row-diff ' + (diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same');
    } else {
      diffEl.textContent = '--';
      diffEl.className = 'wgt-row-diff empty';
    }
  }
}

function getSortedEntries() {
  return Object.entries(wgtData.weights)
    .filter(([,v]) => v !== null && !isNaN(v))
    .sort((a,b) => a[0].localeCompare(b[0]));
}

function updateWgtSummary() {
  const entries = getSortedEntries();
  const last    = entries.length ? entries[entries.length-1][1] : null;
  const start   = wgtData.startWeight;
  const target  = wgtData.targetWeight;

  document.getElementById('w-current').textContent = last !== null ? last + ' KG' : '--';

  const diffEl = document.getElementById('w-diff');
  if(last !== null && start !== null) {
    const d = +(last - start).toFixed(1);
    diffEl.textContent = (d > 0 ? '+' : '') + d + ' KG';
    diffEl.className = 'wv ' + (d < 0 ? 'loss' : d > 0 ? 'gain' : '');
  } else { diffEl.textContent = '--'; diffEl.className = 'wv'; }

  const remEl = document.getElementById('w-remaining');
  if(last !== null && target !== null) {
    const r = +(last - target).toFixed(1);
    if(r <= 0) { remEl.textContent = '🎉 وصلت!'; remEl.className = 'wv'; }
    else { remEl.textContent = r + ' KG'; remEl.className = 'wv'; }
  } else { remEl.textContent = '--'; remEl.className = 'wv'; }
}

function drawChart() {
  const canvas  = document.getElementById('wgt-canvas');
  const emptyEl = document.getElementById('chart-empty');
  const entries = getSortedEntries();
  if(entries.length < 2) { emptyEl.style.display = 'flex'; return; }
  emptyEl.style.display = 'none';

  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const vals = entries.map(e => e[1]);
  const minV = Math.min(...vals) - 1, maxV = Math.max(...vals) + 1;
  const pad  = { t:10, r:10, b:28, l:36 };
  const cw   = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const tx   = i => pad.l + (i/(entries.length-1)) * cw;
  const ty   = v => pad.t + ch - ((v-minV)/(maxV-minV)) * ch;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for(let i=0; i<=4; i++) {
    const y = pad.t + (i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '10px Cairo'; ctx.textAlign = 'right';
    ctx.fillText((maxV - i*(maxV-minV)/4).toFixed(1), pad.l-4, y+4);
  }

  // Target line
  if(wgtData.targetWeight) {
    const ty2 = ty(wgtData.targetWeight);
    if(ty2 >= pad.t && ty2 <= pad.t+ch) {
      ctx.setLineDash([4,4]); ctx.strokeStyle = '#7AE8B8'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(pad.l, ty2); ctx.lineTo(pad.l+cw, ty2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Area
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+ch);
  grad.addColorStop(0, 'rgba(122,184,232,0.22)');
  grad.addColorStop(1, 'rgba(122,184,232,0)');
  ctx.beginPath();
  entries.forEach(([,v],i) => i===0 ? ctx.moveTo(tx(i),ty(v)) : ctx.lineTo(tx(i),ty(v)));
  ctx.lineTo(tx(entries.length-1), pad.t+ch);
  ctx.lineTo(tx(0), pad.t+ch);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle = '#7AB8E8'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  entries.forEach(([,v],i) => i===0 ? ctx.moveTo(tx(i),ty(v)) : ctx.lineTo(tx(i),ty(v)));
  ctx.stroke();

  // Dots
  entries.forEach(([,v],i) => {
    ctx.beginPath(); ctx.arc(tx(i), ty(v), 4, 0, Math.PI*2);
    ctx.fillStyle = '#7AB8E8'; ctx.fill();
    ctx.strokeStyle = '#080808'; ctx.lineWidth = 2; ctx.stroke();
  });
}

function generateDates() {
  const dates = [], start = new Date('2026-04-10T00:00:00'), end = new Date('2026-12-31T00:00:00');
  const cur = new Date(start);
  while(cur <= end) { dates.push(cur.toISOString().split('T')[0]); cur.setDate(cur.getDate()+1); }
  return dates;
}
const ALL_DATES = generateDates();

function renderWeight() {
  document.getElementById('start-weight').value  = wgtData.startWeight  || '';
  document.getElementById('target-weight').value = wgtData.targetWeight || '';

  const list    = document.getElementById('wgt-list');
  list.innerHTML = '';

  const groups  = {};
  ALL_DATES.forEach(d => { const m = d.slice(0,7); if(!groups[m]) groups[m]=[]; groups[m].push(d); });
  const entries = getSortedEntries();

  Object.entries(groups).forEach(([monthKey, dates]) => {
    const [y, mo] = monthKey.split('-');
    const group   = document.createElement('div');
    group.className = 'month-group';
    group.innerHTML = `<div class="month-header">${AR_MONTHS[parseInt(mo)-1]} ${y}</div>`;

    dates.forEach(dateStr => {
      const w = wgtData.weights[dateStr];
      const d = new Date(dateStr + 'T00:00:00');
      const sortedIdx = entries.findIndex(e => e[0] === dateStr);

      let diffHtml = `<div class="wgt-row-diff empty" data-wdiff="${dateStr}">--</div>`;
      if(w !== undefined && sortedIdx > 0) {
        const diff = +(w - entries[sortedIdx-1][1]).toFixed(1);
        const cls  = diff < 0 ? 'loss' : diff > 0 ? 'gain' : 'same';
        diffHtml = `<div class="wgt-row-diff ${cls}" data-wdiff="${dateStr}">${diff>0?'+':''}${diff} KG</div>`;
      } else if(w !== undefined) {
        diffHtml = `<div class="wgt-row-diff same" data-wdiff="${dateStr}">--</div>`;
      }

      const row = document.createElement('div');
      row.className = 'wgt-row';
      row.innerHTML = `
        <div class="wgt-row-date">
          ${d.getDate()} ${AR_MONTHS[d.getMonth()]}
          <span>${AR_DAYS[d.getDay()]}</span>
        </div>
        <input class="wgt-row-input" type="number" placeholder="--" value="${w !== undefined ? w : ''}"
          step="0.1" min="0" oninput="updateWeight('${dateStr}', this.value)" />
        ${diffHtml}
      `;
      group.appendChild(row);
    });
    list.appendChild(group);
  });

  updateWgtSummary();
  setTimeout(drawChart, 50);
}

// ─── INIT ───
renderDays();
renderWeight();
</script>
</body>
</html>
